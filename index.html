<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Cage Match</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        :root {
            --font-title: 'DotGothic16', monospace, sans-serif;
            --font-main: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            
            --bg-color: #fce4ec;
            --box-bg: rgba(255, 255, 255, 0.98);
            --text-color: #2b1f24;
            --accent-color: #e91e63;
            --border-color: #f48fb1;
            
            --glitch-intensity: 0px;
            --stat-bg: rgba(0,0,0,0.05);
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            transition: background-color 2s ease, color 2s ease;
        }

        #app-wrapper { width: 100%; max-width: 1000px; z-index: 10; position: relative; }

        .container-box {
            background: var(--box-bg);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 2px solid var(--border-color);
            box-sizing: border-box;
            transition: background 2s ease, border-color 2s ease, color 2s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .glitch-text {
            font-family: var(--font-title);
            text-shadow: 
                calc(var(--glitch-intensity) * 1) 0 0 rgba(255,0,100,0.5),
                calc(var(--glitch-intensity) * -1) 0 0 rgba(0,255,255,0.5);
            transition: text-shadow 0.5s;
        }

        h1 { font-family: var(--font-title); font-size: 1.8rem; border-bottom: 2px dashed var(--accent-color); padding-bottom: 15px; margin-bottom: 30px; color: var(--accent-color); letter-spacing: 2px; transition: color 2s ease, border-color 2s ease; }
        
        .top-nav { position: absolute; top: -50px; right: 0; display: flex; gap: 10px; }
        .small-btn { font-family: var(--font-main); background: var(--box-bg); color: var(--accent-color); border: 2px solid var(--border-color); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .small-btn:hover { background: var(--accent-color); color: #fff; }

        .status-container { background: rgba(128,128,128,0.1); padding: 16px; border-radius: 8px; margin-bottom: 30px; text-align: left; border: 1px solid var(--border-color); transition: border-color 2s ease; }
        .status-title { font-family: var(--font-title); font-size: 0.85rem; color: var(--accent-color); margin-bottom: 12px; text-align: center; letter-spacing: 2px; transition: color 2s ease; }
        .stat-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem; font-family: var(--font-title); }
        .stat-label { width: 15px; font-weight: bold; text-align: center; }
        .stat-bar-bg { flex: 1; height: 10px; background: var(--stat-bg); border-radius: 5px; overflow: hidden; margin: 0 12px; border: 1px solid var(--border-color); }
        .stat-bar-fill { height: 100%; background: var(--accent-color); width: 50%; transition: width 0.4s ease, background 2s ease; }
        .stat-val { width: 25px; text-align: right; font-weight: bold; }

        .question-text { font-size: 1.05rem; margin-bottom: 35px; line-height: 1.7; min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; letter-spacing: 0.5px; }

        .scale-labels { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 12px; padding: 0 20px; opacity: 0.8; font-weight: bold; }
        .scale-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .scale-btn { flex: 1; max-width: 70px; height: 50px; border-radius: 6px; background: rgba(128,128,128,0.05); border: 2px solid var(--border-color); cursor: pointer; transition: 0.2s; position: relative; font-family: var(--font-title); font-size: 1.2rem; font-weight: bold; }
        .scale-btn:hover, .scale-btn:active { background: var(--accent-color); border-color: var(--accent-color); color: white; }

        .hidden { display: none !important; }
        
        .blind-cards-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 35px; }
        .blind-card { background: var(--box-bg); border: 2px solid var(--border-color); border-radius: 8px; padding: 18px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
        .blind-card:hover { transform: scale(1.02); filter: brightness(1.1); }
        .blind-card.glow { border: 2px solid #ff4081; box-shadow: 0 0 15px rgba(255, 64, 129, 0.5); animation: neonPulse 1.5s infinite alternate; }
        @keyframes neonPulse { from { box-shadow: 0 0 5px #f06292; } to { box-shadow: 0 0 20px #e91e63; } }
        
        .card-icon-mystery { font-family: var(--font-title); font-size: 1.5rem; opacity: 0.5; width: 40px; }
        .card-tags { font-family: var(--font-main); font-size: 0.85rem; color: var(--accent-color); flex: 1; text-align: left; padding-left: 15px; font-weight: bold; letter-spacing: 0.5px; }

        /* RESULT DETAIL PANEL - SIMPLIFIED */
        .detail-panel { padding: 0; text-align: center; }
        
        .char-quote { font-size: 1.1rem; font-style: italic; color: var(--accent-color); margin-bottom: 24px; line-height: 1.8; font-weight: bold; letter-spacing: 0.5px; }
        .char-quote::before { content: '「'; }
        .char-quote::after { content: '」'; }

        .char-image-section { margin: 20px 0; text-align: center; }
        .char-image { max-width: 100%; max-height: 400px; border-radius: 8px; border: 2px solid var(--border-color); margin-bottom: 12px; }

        .detail-name { font-family: var(--font-main); font-size: 1.3rem; font-weight: 900; color: var(--accent-color); margin-bottom: 20px; padding-bottom: 12px; letter-spacing: 1px; transition: color 2s ease; }
        
        .detail-desc { font-size: 0.95rem; line-height: 1.9; white-space: pre-wrap; font-weight: 500; margin-bottom: 24px; text-align: left; }

        /* EXPAND SENSITIVE BUTTON */
        .expand-sensitive { 
            background: linear-gradient(135deg, var(--accent-color), #ff80ab);
            color: white; 
            border: none;
            padding: 16px 28px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: bold; 
            letter-spacing: 1px;
            margin: 28px 0; 
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.3);
            width: 100%;
            display: block;
        }
        .expand-sensitive:hover { 
            filter: brightness(1.1); 
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(233, 30, 99, 0.4);
        }
        .expand-sensitive.expanded { 
            background: linear-gradient(135deg, #c2185b, #e91e63);
        }

        .sensitive-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
        .sensitive-content.expanded { max-height: 3000px; }

        .sensitive-image-section { margin: 20px 0; text-align: center; }
        .sensitive-text { font-size: 0.95rem; line-height: 1.9; white-space: pre-wrap; font-weight: 500; color: var(--text-color); margin-top: 20px; text-align: left; }

        /* CORRELATIONS */
        .correlations { background: rgba(128,128,128,0.05); padding: 20px; border-radius: 8px; margin-top: 24px; border: 1px solid var(--border-color); }
        .corr-title { font-size: 0.8rem; letter-spacing: 2px; color: var(--accent-color); margin-bottom: 16px; text-transform: uppercase; font-weight: bold; transition: color 2s ease; }
        
        .corr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 14px; }
        .corr-card { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; text-align: center; }
        .corr-icon { width: 70px; height: 70px; background: linear-gradient(135deg, var(--accent-color), #ff80ab); border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; border: 2px solid var(--border-color); transition: 0.3s; }
        .corr-card:hover .corr-icon { transform: scale(1.08); box-shadow: 0 4px 12px rgba(233, 30, 99, 0.3); }
        .corr-card.locked .corr-icon { opacity: 0.3; background: rgba(128,128,128,0.2); border-style: dashed; cursor: not-allowed; }
        .corr-label { font-size: 0.7rem; letter-spacing: 1px; color: var(--accent-color); font-weight: bold; margin-bottom: 3px; transition: color 2s ease; }
        .corr-name { font-size: 0.75rem; color: var(--text-color); font-weight: 600; }
        .corr-card.locked .corr-name { opacity: 0.4; }

        /* BUTTONS */
        .main-btn { 
            font-family: var(--font-main); 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 13px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            transition: 0.2s; 
            font-weight: bold; 
            letter-spacing: 1px;
            display: inline-block;
            margin: 8px;
        }
        .main-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

        .sub-btn { 
            background: transparent; 
            color: var(--accent-color); 
            border: 2px solid var(--accent-color); 
        }
        .sub-btn:hover { background: var(--accent-color); color: white; }

        .buttons-container { display: flex; justify-content: center; gap: 8px; margin-top: 28px; flex-wrap: wrap; }

        /* ARCHIVE GRID - 4 columns */
        .archive-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 16px; 
            margin-bottom: 40px; 
            margin-top: 20px;
        }
        .archive-slot { 
            background: rgba(128,128,128,0.1); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 0; 
            cursor: pointer; 
            transition: 0.2s; 
            aspect-ratio: 1 / 1;
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }
        .archive-slot img { width: 100%; height: 100%; object-fit: cover; }
        .archive-slot.locked { 
            background: #1a1a1a; 
            cursor: not-allowed; 
            border: 2px dashed rgba(128,128,128,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .archive-slot.locked::before {
            content: '🔒';
            font-size: 48px;
            opacity: 0.5;
        }
        .archive-slot.unimplemented {
            background: #2a2a2a;
            cursor: not-allowed;
            border: 2px dashed rgba(128,128,128,0.3);
        }
        .archive-slot.unimplemented::before {
            content: '？';
            font-size: 48px;
            color: #666;
            font-weight: bold;
        }
        .archive-slot.unlocked { border: 2px solid var(--accent-color); box-shadow: 0 0 10px rgba(233, 30, 99, 0.3); }
        .archive-slot:hover:not(.locked):not(.unimplemented) { filter: brightness(1.15); transform: scale(1.02); }

        #shatter-flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; }
        .anim-shatter-flash { animation: flashShatter 1s ease-out forwards; }
        @keyframes flashShatter { 0% { opacity: 0; } 10% { opacity: 1; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .anim-break-container { animation: breakContainer 1s forwards; }
        @keyframes breakContainer { 0% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); } 20% { transform: scale(1.05) rotate(-2deg); filter: brightness(2); } 100% { transform: translateY(100vh) rotate(15deg) scale(0.8); opacity: 0; filter: brightness(0); } }
        .anim-fade-in { animation: fadeIn 1.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1200px) {
            .archive-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 768px) {
            .container-box { padding: 28px; }
            .archive-grid { grid-template-columns: repeat(4, 1fr); }
            .corr-grid { grid-template-columns: repeat(2, 1fr); }
            .scale-btn { max-width: 60px; }
        }
    </style>
</head>
<body>

<div id="shatter-flash"></div>

<div id="app-wrapper">
    <div class="top-nav">
        <button onclick="toggleLang()" class="small-btn" id="lang-btn">EN</button>
    </div>

    <!-- Start Screen -->
    <div id="screen-start" class="container-box">
        <h1 class="glitch-text">Sugar Cage</h1>
        <h2 style="font-family: var(--font-title); font-size: 1rem; opacity: 0.7; font-weight:normal; margin-bottom: 20px;" data-text="subtitle">パートナーマッチング</h2>
        <p style="font-size: 0.95rem; line-height: 1.7; margin: 30px 0 40px; font-weight: 500;" data-text="start_desc">
            このマッチングアプリは、あなたの真の恋愛観を暴き出して、最高のパートナーとマッチングさせます♡
        </p>
        <button class="main-btn" onclick="startQuiz()" data-text="start_btn" style="padding: 16px 48px; font-size: 1rem; letter-spacing: 2px;">START</button>
        <button class="main-btn sub-btn" onclick="openArchive()" data-text="archive_btn" style="padding: 16px 48px; font-size: 1rem; letter-spacing: 2px;">ARCHIVE</button>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="container-box hidden">
        <div class="status-container">
            <div class="status-title glitch-text">STATUS</div>
            <div class="stat-row"><span class="stat-label">P</span><div class="stat-bar-bg"><div id="bar-P" class="stat-bar-fill"></div></div><span id="val-P" class="stat-val">5</span></div>
            <div class="stat-row"><span class="stat-label">M</span><div class="stat-bar-bg"><div id="bar-M" class="stat-bar-fill"></div></div><span id="val-M" class="stat-val">5</span></div>
            <div class="stat-row"><span class="stat-label">I</span><div class="stat-bar-bg"><div id="bar-I" class="stat-bar-fill"></div></div><span id="val-I" class="stat-val">5</span></div>
            <div class="stat-row"><span class="stat-label">E</span><div class="stat-bar-bg"><div id="bar-E" class="stat-bar-fill"></div></div><span id="val-E" class="stat-val">5</span></div>
        </div>

        <h3 id="question-number" class="glitch-text" style="font-family: var(--font-title); margin: 0 0 20px 0; color: var(--accent-color); font-size: 1.2rem;">Q1 / 15</h3>
        <div id="question-text" class="question-text"></div>
        
        <div class="scale-labels">
            <span data-text="agree">わかる</span>
            <span data-text="neutral">迷う</span>
            <span data-text="disagree">ちがう</span>
        </div>
        <div id="options-container" class="scale-container"></div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="container-box hidden">
        <h1 class="glitch-text" style="color:var(--accent-color);">Analysis Complete</h1>
        
        <div id="result-selection">
            <p style="font-size: 0.9rem; margin: 25px 0; font-weight: 500; line-height: 1.8;" data-text="result_desc">
                あなたに、♡が届いています。一人を選んでマッチングしましょう
            </p>
            <div class="blind-cards-container" id="blind-cards-container"></div>
        </div>

        <div id="result-details" class="hidden">
            <div class="detail-panel">
                <div id="result-quote" class="char-quote"></div>

                <div class="char-image-section">
                    <img id="result-image-safe" class="char-image" src="" alt="Safe">
                </div>

                <div class="detail-name" id="detail-name"></div>
                <div class="detail-desc" id="detail-desc"></div>

                <button class="expand-sensitive" id="expand-btn" onclick="toggleSensitive(this, 'result')" data-text="expand_btn">▼ もっと深く知る覚悟はある？</button>

                <div class="sensitive-content" id="result-sensitive-content">
                    <div class="sensitive-image-section">
                        <img id="result-image-sensitive" class="char-image" src="" alt="Sensitive">
                    </div>
                    <div class="sensitive-text" id="result-sensitive-text"></div>
                </div>

                <div class="correlations hidden" id="result-correlations">
                    <div class="corr-title" data-text="correlations">▸ 関係性</div>
                    <div class="corr-grid" id="result-corr-list"></div>
                </div>
            </div>

            <div class="buttons-container">
                <button class="main-btn" onclick="shareResultX()" data-text="share_btn">𝕏 SHARE</button>
                <button class="main-btn sub-btn" onclick="openArchiveFromResult()" data-text="archive_link">ARCHIVE</button>
                <button class="main-btn sub-btn" onclick="followX()" data-text="follow_btn">🔗 Follow @ai_be2</button>
                <button class="main-btn sub-btn" onclick="resetQuiz()" data-text="restart_btn">RESTART</button>
            </div>
        </div>
    </div>

    <!-- Archive Screen -->
    <div id="screen-archive" class="container-box hidden">
        <h1 class="glitch-text" data-text="archive_title">ARCHIVE</h1>
        
        <div id="archive-grid-view">
            <div class="archive-grid" id="archive-grid-container"></div>
            <div class="buttons-container">
                <button class="main-btn sub-btn" onclick="closeArchive()" data-text="back_btn">BACK</button>
            </div>
        </div>

        <div id="archive-detail-view" class="hidden">
            <div class="detail-panel">
                <div id="archive-quote" class="char-quote"></div>

                <div class="char-image-section">
                    <img id="archive-image-safe" class="char-image" src="" alt="Safe">
                </div>

                <div class="detail-name" id="arc-detail-name"></div>
                <div class="detail-desc" id="arc-detail-desc"></div>

                <button class="expand-sensitive" id="arc-expand-btn" onclick="toggleSensitive(this, 'archive')" data-text="expand_btn">▼ もっと深く知る覚悟はある？</button>

                <div class="sensitive-content" id="archive-sensitive-content">
                    <div class="sensitive-image-section">
                        <img id="archive-image-sensitive" class="char-image" src="" alt="Sensitive">
                    </div>
                    <div class="sensitive-text" id="archive-sensitive-text"></div>
                </div>

                <div class="correlations hidden" id="archive-correlations">
                    <div class="corr-title" data-text="correlations">▸ 関係性</div>
                    <div class="corr-grid" id="archive-corr-list"></div>
                </div>
            </div>

            <div class="buttons-container">
                <button class="main-btn sub-btn" onclick="backToArchiveGrid()" data-text="back_btn">BACK</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ja';
    let stats = { P: 5, M: 5, I: 5, E: 5 };
    let currentQuestionIndex = 0;
    let quizQuestions = [];
    let allQuestions = [];
    let top3Results = [];
    let characters = [];
    let viewedCharIds = new Set();

    const ui = {
        subtitle: { ja: "パートナーマッチング", en: "Partner Matching" },
        start_desc: { ja: "このマッチングアプリは、あなたの真の恋愛観を暴き出して、最高のパートナーとマッチングさせます♡", en: "This matching app reveals your true romantic outlook and finds the perfect partner for you. ♡" },
        start_btn: { ja: "START", en: "START" },
        archive_btn: { ja: "ARCHIVE", en: "ARCHIVE" },
        agree: { ja: "わかる", en: "Agree" },
        neutral: { ja: "迷う", en: "Neutral" },
        disagree: { ja: "ちがう", en: "Disagree" },
        result_desc: { ja: "あなたに、♡が届いています。一人を選んでマッチングしましょう", en: "You have 3 ♡ matches. Choose one to confirm your match." },
        expand_btn: { ja: "▼ もっと深く知る覚悟はある？", en: "▼ Ready to know more?" },
        share_btn: { ja: "𝕏 SHARE", en: "𝕏 SHARE" },
        archive_link: { ja: "ARCHIVE", en: "ARCHIVE" },
        follow_btn: { ja: "🔗 Follow @ai_be2", en: "🔗 Follow @ai_be2" },
        restart_btn: { ja: "RESTART", en: "RESTART" },
        archive_title: { ja: "観測記録", en: "ARCHIVE" },
        back_btn: { ja: "戻る", en: "BACK" },
        correlations: { ja: "▸ 関係性", en: "▸ Relations" }
    };

    allQuestions = [
        { q: { ja: "恋人は自分のすべてを知るべきだ。", en: "A lover should know absolutely everything about me." }, effects: { P: 1, M: 0, I: 2, E: -1 } },
        { q: { ja: "相手が望むなら、自分を傷つけても構わない。", en: "If my partner desires it, I don't mind hurting myself." }, effects: { P: -2, M: 2, I: 0, E: 1 } },
        { q: { ja: "秘密や嘘は、愛を深めるスパイスになる。", en: "Secrets and lies are spices that deepen love." }, effects: { P: 0, M: -1, I: -2, E: 2 } },
        { q: { ja: "相手を完全に支配し、コントロールしたい。", en: "I want to completely dominate and control my partner." }, effects: { P: 2, M: -2, I: 1, E: 0 } },
        { q: { ja: "愛情表現は言葉よりも、肉体的な痛みが伴う方が信じられる。", en: "Physical pain makes expressions of love more believable than mere words." }, effects: { P: 1, M: 2, I: 0, E: -1 } },
        { q: { ja: "誰にも言えない性癖や願望がある。", en: "I have sexual desires and fetishes I can't tell anyone." }, effects: { P: 0, M: 1, I: -1, E: 2 } },
        { q: { ja: "恋人が他の誰かに惹かれていくのを見ることに、興奮を覚えるかもしれない。", en: "I might feel aroused watching my lover be attracted to someone else." }, effects: { P: -1, M: 2, I: -2, E: 2 } },
        { q: { ja: "相手の人生や価値観を、自分の手でめちゃくちゃに壊してみたい。", en: "I want to completely ruin my partner's life and values with my own hands." }, effects: { P: 2, M: 0, I: 1, E: 1 } },
        { q: { ja: "自分の存在価値は、誰かに消費されることでしか見出せない。", en: "I can only find my worth by being consumed by someone else." }, effects: { P: -2, M: 2, I: 2, E: 0 } },
        { q: { ja: "相手の絶望した顔こそが、最も美しいと思う。", en: "My partner's face in despair is the most beautiful thing." }, effects: { P: 2, M: -1, I: 0, E: 2 } },
        { q: { ja: "愛する人のためなら、社会的な地位や名誉を失ってもいい。", en: "For the one I love, I don't mind losing my social status and honor." }, effects: { P: 0, M: 2, I: 2, E: -1 } },

        { q: { ja: "互いのすべてを喰らい合い、形がなくなるまで混ざり合いたい。", en: "I want us to devour each other's everything and mix until we lose our forms." }, effects: { P: 1, M: 0, I: 1, E: 1 } }

        { bg: "#f0d0dc", box: "rgba(255,245,250,0.98)", text: "#241b1f", acc: "#d81b60", bdr: "#e07a9e", statBg: "rgba(0,0,0,0.08)" },

        { bg: "#dcbac6", box: "rgba(240,220,230,0.98)", text: "#1a1013", acc: "#c2185b", bdr: "#c85a80", statBg: "rgba(0,0,0,0.15)" },
        { bg: "#c19fad", box: "rgba(186,163,173,0.98)", text: "#180d10", acc: "#b02263", bdr: "#bb5b7c", statBg: "rgba(0,0,0,0.18)" },
        { bg: "#a68595", box: "rgba(133,106,116,0.98)", text: "#160a0d", acc: "#9d2c6b", bdr: "#af5d78", statBg: "rgba(0,0,0,0.2)" },

        { bg: "#6d4757", box: "rgba(58,35,43,0.98)",    text: "#fdf5f8", acc: "#fa5c90", bdr: "#9a4362", statBg: "rgba(255,255,255,0.1)" },
        { bg: "#4d2e3b", box: "rgba(36,20,26,0.98)",    text: "#fdf5f8", acc: "#f777a0", bdr: "#912c4c", statBg: "rgba(255,255,255,0.1)" },
        { bg: "#2e1920", box: "rgba(25,15,18,0.98)",    text: "#ffffff", acc: "#f48fb1", bdr: "#8a1d3b", statBg: "rgba(255,255,255,0.15)" },
        { bg: "#1d1115", box: "rgba(22,13,16,0.98)",    text: "#ffffff", acc: "#f48fb1", bdr: "#891535", statBg: "rgba(255,255,255,0.15)" },
        { bg: "#0d090a", box: "rgba(20,11,14,0.98)",    text: "#ffffff", acc: "#f48fb1", bdr: "#880e4f", statBg: "rgba(255,255,255,0.15)" }
    ];

    function loadViewedChars() {
        const saved = localStorage.getItem('sugar_cage_viewed');
        if (saved) {
            viewedCharIds = new Set(JSON.parse(saved));
        }
    }

    function saveViewedChars() {
        localStorage.setItem('sugar_cage_viewed', JSON.stringify(Array.from(viewedCharIds)));
    }

    async function loadCharacters() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/ghbe2/sugar-cage/main/characters.json');
            if (!response.ok) throw new Error('JSON読み込み失敗');
            characters = await response.json();
            console.log('✅ キャラデータ読み込み完了:', characters.length, 'キャラ');
        } catch (error) {
            console.error('❌ エラー:', error);
            alert('キャラクターデータの読み込みに失敗しました。ページをリロードしてください。');
        }
    }

    function t(key) {
        return ui[key] ? ui[key][currentLang] : "";
    }

    function toggleLang() {
        currentLang = currentLang === 'ja' ? 'en' : 'ja';
        document.getElementById('lang-btn').innerText = currentLang === 'ja' ? 'EN' : 'JA';
        updateUITexts();
        
        if (!document.getElementById('screen-quiz').classList.contains('hidden')) {
            showQuestion(false);
        }
        
        if (!document.getElementById('result-selection').classList.contains('hidden') && top3Results.length > 0) {
            renderBlindCards();
        }
        
        if (!document.getElementById('result-details').classList.contains('hidden')) {
            const charId = parseInt(document.getElementById('detail-name').getAttribute('data-char-id'));
            if(charId) revealResult(characters.find(c => c.id === charId));
        }
        
        if (!document.getElementById('screen-archive').classList.contains('hidden')) {
            renderArchive();
            if (!document.getElementById('archive-detail-view').classList.contains('hidden')) {
                const charId = parseInt(document.getElementById('arc-detail-name').getAttribute('data-char-id'));
                if(charId) showArchiveDetail(characters.find(c => c.id === charId));
            }
        }
    }

    function updateUITexts() {
        document.querySelectorAll('[data-text]').forEach(el => {
            const key = el.getAttribute('data-text');
            if (ui[key]) el.innerHTML = ui[key][currentLang];
        });
    }

    function applySmoothColorPhase() {
        let idx = Math.min(currentQuestionIndex, 14);
        const c = colorPhases[idx];
        
        const root = document.documentElement;
        root.style.setProperty('--bg-color', c.bg);
        root.style.setProperty('--box-bg', c.box);
        root.style.setProperty('--text-color', c.text);
        root.style.setProperty('--accent-color', c.acc);
        root.style.setProperty('--border-color', c.bdr);
        root.style.setProperty('--stat-bg', c.statBg);
        
        root.style.setProperty('--glitch-intensity', (idx * 0.1) + 'px');
    }

    function updateStatusUI() {
        ['P', 'M', 'I', 'E'].forEach(key => {
            stats[key] = Math.max(0, Math.min(10, stats[key]));
            document.getElementById('val-' + key).innerText = stats[key];
            document.getElementById('bar-' + key).style.width = (stats[key] / 10) * 100 + '%';
        });
    }

    function selectRandomQuestions() {
        let shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 15);
    }

    function resetQuiz() {
        stats = { P: 5, M: 5, I: 5, E: 5 };
        currentQuestionIndex = 0;
        applySmoothColorPhase();

        const quizScreen = document.getElementById('screen-quiz');
        quizScreen.classList.remove('anim-break-container');
        document.getElementById('screen-result').classList.remove('anim-fade-in');

        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('result-selection').classList.remove('hidden');
        document.getElementById('result-details').classList.add('hidden');
        document.getElementById('screen-start').classList.remove('hidden');
        updateStatusUI();
    }

    async function startQuiz() {
        if (characters.length === 0) {
            await loadCharacters();
        }

        selectRandomQuestions();
        document.getElementById('screen-start').classList.add('hidden');
        const quizScreen = document.getElementById('screen-quiz');
        quizScreen.classList.remove('hidden', 'anim-break-container');
        updateStatusUI();
        showQuestion(true);
    }

    function showQuestion(advance = true) {
        applySmoothColorPhase();
        const q = quizQuestions[currentQuestionIndex];
        document.getElementById('question-number').innerText = 'Q' + (currentQuestionIndex + 1) + ' / 15';
        document.getElementById('question-text').innerText = q.q[currentLang];
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const btns = [
            { label: '<<', mult: 2 },
            { label: '<', mult: 1 },
            { label: '≡', mult: 'random' },
            { label: '>', mult: -1 },
            { label: '>>', mult: -2 }
        ];
        
        btns.forEach((btn) => {
            const btnEl = document.createElement('button');
            btnEl.className = 'scale-btn';
            btnEl.innerText = btn.label;
            btnEl.onclick = () => selectOption(q.effects, btn.mult);
            container.appendChild(btnEl);
        });
    }

    function selectOption(effects, multiplier) {
        if (multiplier === 'random') {
            const keys = ['P', 'M', 'I', 'E'];
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            const randomChange = Math.floor(Math.random() * 3) - 1;
            stats[randomKey] += randomChange;
        } else {
            ['P', 'M', 'I', 'E'].forEach(key => {
                if(effects[key]) stats[key] += (effects[key] * (multiplier > 0 ? 1 : (multiplier < 0 ? -1 : 0)));
            });
        }

        currentQuestionIndex++;
        if (currentQuestionIndex < 15) {
            updateStatusUI();
            showQuestion(true);
        } else {
            playShatterTransition();
        }
    }

    function playShatterTransition() {
        const flash = document.getElementById('shatter-flash');
        flash.classList.add('anim-shatter-flash');
        const quizScreen = document.getElementById('screen-quiz');
        quizScreen.classList.add('anim-break-container');

        setTimeout(() => {
            quizScreen.classList.add('hidden');
            const resultScreen = document.getElementById('screen-result');
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('anim-fade-in');
            processResult();
        }, 500);

        setTimeout(() => {
            flash.classList.remove('anim-shatter-flash');
        }, 1200);
    }

    function processResult() {
        let availableChars = characters.filter(c => viewedCharIds.has(c.id) && c.id <= 12);
        if (availableChars.length === 0) availableChars = characters.filter(c => c.id <= 12);
        
        let ranked = availableChars.map(char => {
            let dist = Math.abs(stats.P - char.P) + Math.abs(stats.M - char.M) + 
                       Math.abs(stats.I - char.I) + Math.abs(stats.E - char.E);
            return { ...char, dist: dist };
        }).sort((a, b) => a.dist - b.dist);

        let top3 = ranked.slice(0, 3);
        if (top3.length > 0) top3[0].isBest = true;

        top3Results = top3.sort(() => Math.random() - 0.5);
        renderBlindCards();
    }

    function renderBlindCards() {
        const container = document.getElementById('blind-cards-container');
        container.innerHTML = '';

        top3Results.forEach((char) => {
            const card = document.createElement('div');
            card.className = 'blind-card ' + (char.isBest ? 'glow' : '');
            const tagsText = char.tags[currentLang] ? char.tags[currentLang].map(t => '#' + t).join(' ') : '#???';
            card.innerHTML = '<div class="card-icon-mystery">♡</div><div class="card-tags">' + tagsText + '</div>';
            card.onclick = () => revealResult(char);
            container.appendChild(card);
        });
    }

    function revealResult(char) {
        viewedCharIds.add(char.id);
        saveViewedChars();

        document.getElementById('result-selection').classList.add('hidden');
        document.getElementById('result-details').classList.remove('hidden');
        
        const nameEl = document.getElementById('detail-name');
        nameEl.innerText = 'No.' + char.id + ' ' + char.name[currentLang];
        nameEl.setAttribute('data-char-id', char.id);
        
        document.getElementById('result-quote').innerText = char.quote[currentLang] || '';
        document.getElementById('result-image-safe').src = char.imageSafe;
        document.getElementById('detail-desc').innerText = char.desc[currentLang];

        document.getElementById('result-sensitive-content').classList.remove('expanded');
        document.getElementById('expand-btn').classList.remove('expanded');
        document.getElementById('expand-btn').innerText = ui.expand_btn[currentLang];
        document.getElementById('result-image-sensitive').src = char.imageSensitive;
        document.getElementById('result-sensitive-text').innerText = char.descSensitive[currentLang];

        const corrEl = document.getElementById('result-correlations');
        if (char.correlations && char.correlations.length > 0) {
            corrEl.classList.remove('hidden');
            const corrList = document.getElementById('result-corr-list');
            corrList.innerHTML = '';
            char.correlations.forEach(corr => {
                const corrChar = characters.find(c => c.id === corr.id);
                if (!corrChar) return;
                const isLocked = !viewedCharIds.has(corr.id);
                const corrCard = document.createElement('div');
                corrCard.className = 'corr-card ' + (isLocked ? 'locked' : '');
                corrCard.onclick = () => {
                    if (!isLocked) showArchiveDetail(corrChar);
                };
                corrCard.innerHTML = '<div class="corr-icon">♡</div><div class="corr-label">' + corr.type[currentLang] + '</div><div class="corr-name">' + (isLocked ? '???' : corrChar.name[currentLang]) + '</div>';
                corrList.appendChild(corrCard);
            });
        } else {
            corrEl.classList.add('hidden');
        }
    }

    function toggleSensitive(btn, type) {
        const contentId = type === 'result' ? 'result-sensitive-content' : 'archive-sensitive-content';
        const content = document.getElementById(contentId);
        const btnId = type === 'result' ? 'expand-btn' : 'arc-expand-btn';
        const btnEl = document.getElementById(btnId);

        content.classList.toggle('expanded');
        btnEl.classList.toggle('expanded');
        
        if (content.classList.contains('expanded')) {
            btnEl.innerText = currentLang === 'ja' ? '▲ ふたりだけの秘密にする' : '▲ Keep it secret';
        } else {
            btnEl.innerText = ui.expand_btn[currentLang];
        }
    }
    
    function shareResultX() {
        const char = characters.find(c => c.id === parseInt(document.getElementById('detail-name').getAttribute('data-char-id')));
        if (!char) return;
        
        const text = 'No.' + char.id + ' ' + char.name[currentLang] + '\n' + char.quote[currentLang] + '\n#SugarCageMatch';
        const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=https://ghbe2.github.io/sugar-cage/';
        window.open(url, '_blank');
    }

    function followX() {
        window.open('https://twitter.com/intent/follow?screen_name=ai_be2', '_blank');
    }

    function openArchiveFromResult() {
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-archive').classList.remove('hidden');
        renderArchive();
        document.getElementById('archive-grid-view').classList.remove('hidden');
        document.getElementById('archive-detail-view').classList.add('hidden');
    }

    function openArchive() {
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-archive').classList.remove('hidden');
        renderArchive();
        document.getElementById('archive-grid-view').classList.remove('hidden');
        document.getElementById('archive-detail-view').classList.add('hidden');
    }

    function closeArchive() {
        document.getElementById('screen-archive').classList.add('hidden');
        document.getElementById('screen-start').classList.remove('hidden');
    }

    function renderArchive() {
        const container = document.getElementById('archive-grid-container');
        container.innerHTML = '';
        
        characters.forEach(char => {
            const slot = document.createElement('div');
            const isViewed = viewedCharIds.has(char.id);
            const isUnimplemented = char.id > 12;
            
            if (isUnimplemented) {
                slot.className = 'archive-slot unimplemented';
            } else if (isViewed) {
                slot.className = 'archive-slot unlocked';
                const img = document.createElement('img');
                img.src = '/images/characters/' + String(char.id).padStart(2, '0') + '_icon.png';
                slot.appendChild(img);
                slot.onclick = () => showArchiveDetail(char);
            } else {
                slot.className = 'archive-slot locked';
            }
            
            container.appendChild(slot);
        });
    }

    function showArchiveDetail(char) {
        document.getElementById('archive-grid-view').classList.add('hidden');
        document.getElementById('archive-detail-view').classList.remove('hidden');
        
        const nameEl = document.getElementById('arc-detail-name');
        nameEl.innerText = 'No.' + char.id + ' ' + char.name[currentLang];
        nameEl.setAttribute('data-char-id', char.id);
        
        document.getElementById('archive-quote').innerText = char.quote[currentLang] || '';
        document.getElementById('archive-image-safe').src = char.imageSafe;
        document.getElementById('arc-detail-desc').innerText = char.desc[currentLang];

        document.getElementById('archive-sensitive-content').classList.remove('expanded');
        document.getElementById('arc-expand-btn').classList.remove('expanded');
        document.getElementById('arc-expand-btn').innerText = ui.expand_btn[currentLang];
        document.getElementById('archive-image-sensitive').src = char.imageSensitive;
        document.getElementById('archive-sensitive-text').innerText = char.descSensitive[currentLang];

        const corrEl = document.getElementById('archive-correlations');
        if (char.correlations && char.correlations.length > 0) {
            corrEl.classList.remove('hidden');
            const corrList = document.getElementById('archive-corr-list');
            corrList.innerHTML = '';
            char.correlations.forEach(corr => {
                const corrChar = characters.find(c => c.id === corr.id);
                if (!corrChar) return;
                const isLocked = !viewedCharIds.has(corr.id);
                const corrCard = document.createElement('div');
                corrCard.className = 'corr-card ' + (isLocked ? 'locked' : '');
                corrCard.onclick = () => {
                    if (!isLocked) showArchiveDetail(corrChar);
                };
                corrCard.innerHTML = '<div class="corr-icon">♡</div><div class="corr-label">' + corr.type[currentLang] + '</div><div class="corr-name">' + (isLocked ? '???' : corrChar.name[currentLang]) + '</div>';
                corrList.appendChild(corrCard);
            });
        } else {
            corrEl.classList.add('hidden');
        }
    }

    function backToArchiveGrid() {
        document.getElementById('archive-detail-view').classList.add('hidden');
        document.getElementById('archive-grid-view').classList.remove('hidden');
    }

    updateUITexts();
    loadViewedChars();
    loadCharacters();

</script>
